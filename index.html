<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandi Market Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-[700px]">

<h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">
KRISHNA TRADING COMPANY BUYERS CALCULATOR
</h1>

<div class="mb-4">
<label class="font-medium">Number of Entries</label>
<input id="entryCount" type="number" class="w-full border p-2 rounded">
<button onclick="createEntries()" class="mt-2 bg-blue-500 text-white px-4 py-1 rounded">
Generate
</button>
</div>

<div id="entries" class="space-y-3"></div>

<button onclick="calculate()" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 mt-4">
Calculate Totals
</button>

<div id="resultBox" class="mt-6 hidden">

<h2 class="font-semibold text-lg mb-3">Results</h2>

<div class="grid grid-cols-2 gap-2 text-sm">

<div>Total Weight</div>
<div id="totalWeight"></div>

<div>Total Bags</div>
<div id="totalBags"></div>

<div>Total Amount</div>
<div id="amount"></div>

<div>Commission (2%)</div>
<div id="commission"></div>

<div>Labour</div>
<div id="labour"></div>

<div>Veman</div>
<div id="veman"></div>

<div>Cess</div>
<div id="cess"></div>

<div>Association</div>
<div id="association"></div>

<div>CGST</div>
<div id="cgst"></div>

<div>SGST</div>
<div id="sgst"></div>

<div class="font-semibold">Total Charges</div>
<div id="totalCharges"></div>

<div class="text-lg font-bold text-green-600">Total Payable</div>
<div id="totalPayable" class="text-lg font-bold text-green-600"></div>

</div>

</div>

</div>

<script>

// truncate (no rounding)
function truncateTwo(num){
return Math.floor(num * 100) / 100
}

// mandi rounding rule
function roundPaise(num){

let truncated = Math.floor(num * 100) / 100
let thirdDigit = Math.floor((num * 1000) % 10)

if(thirdDigit >= 5){
truncated += 0.01
}

return truncated
}

// indian currency format
function formatINR(num){
return "₹ " + num.toLocaleString("en-IN", {minimumFractionDigits:2, maximumFractionDigits:2})
}

function createEntries(){

let count = document.getElementById("entryCount").value
let container = document.getElementById("entries")

container.innerHTML=""

for(let i=0;i<count;i++){

container.innerHTML += `

<div class="grid grid-cols-4 gap-3 items-center">

<input type="number" step="0.01" placeholder="Weight (kg)"
class="weight border p-2 rounded" oninput="updateAmount(this)">

<input type="number" step="0.01" placeholder="Rate (per 100kg)"
class="rate border p-2 rounded" oninput="updateAmount(this)">

<input type="number" placeholder="Bags"
class="bags border p-2 rounded">

<div class="amount font-semibold text-green-600">₹ 0</div>

</div>

`

}

}

function updateAmount(element){

let row = element.parentElement

let weight = parseFloat(row.querySelector(".weight").value) || 0
let rate = parseFloat(row.querySelector(".rate").value) || 0

let ratePerKg = rate / 100

let amount = truncateTwo(weight * ratePerKg)

row.querySelector(".amount").innerText = formatINR(amount)

}

function calculate(){

let weights = document.querySelectorAll(".weight")
let rates = document.querySelectorAll(".rate")
let bags = document.querySelectorAll(".bags")

let totalWeight = 0
let totalBags = 0
let amount = 0

for(let i=0;i<weights.length;i++){

let w = parseFloat(weights[i].value) || 0
let r = parseFloat(rates[i].value) || 0
let b = parseFloat(bags[i].value) || 0

let ratePerKg = r / 100

totalWeight += w
totalBags += b

amount += truncateTwo(w * ratePerKg)

}

// amount rule
amount = truncateTwo(amount)

// charges rule
let commission = roundPaise(amount * 0.02)
let labour = roundPaise(totalBags * 5.5)
let veman = roundPaise(totalBags * 2)
let cess = roundPaise(amount * 0.006)
let association = roundPaise(totalBags * 0.5)
let cgst = roundPaise(amount * 0.025)
let sgst = roundPaise(amount * 0.025)

let totalCharges = roundPaise(
commission + labour + veman + cess + association + cgst + sgst
)

let totalPayable = truncateTwo(amount + totalCharges)

document.getElementById("totalWeight").innerText = totalWeight.toFixed(2)+" kg"
document.getElementById("totalBags").innerText = totalBags
document.getElementById("amount").innerText = formatINR(amount)
document.getElementById("commission").innerText = formatINR(commission)
document.getElementById("labour").innerText = formatINR(labour)
document.getElementById("veman").innerText = formatINR(veman)
document.getElementById("cess").innerText = formatINR(cess)
document.getElementById("association").innerText = formatINR(association)
document.getElementById("cgst").innerText = formatINR(cgst)
document.getElementById("sgst").innerText = formatINR(sgst)
document.getElementById("totalCharges").innerText = formatINR(totalCharges)
document.getElementById("totalPayable").innerText = formatINR(totalPayable)

document.getElementById("resultBox").classList.remove("hidden")

}

</script>

</body>
</html>
