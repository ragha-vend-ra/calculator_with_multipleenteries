<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mandi Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-[650px]">

<h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">
Market Commission Calculator
</h1>

<!-- number of entries -->

<div class="mb-4">
<label class="font-medium">Number of Entries</label>
<input id="entryCount" type="number" class="w-full border p-2 rounded">
<button onclick="createEntries()" class="mt-2 bg-blue-500 text-white px-4 py-1 rounded">
Generate
</button>
</div>

<!-- dynamic inputs -->

<div id="entries" class="space-y-3"></div>

<button onclick="calculate()" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 mt-4">
Calculate
</button>

<!-- results -->

<div id="resultBox" class="mt-6 hidden">

<h2 class="font-semibold text-lg mb-3">Results</h2>

<div class="grid grid-cols-2 gap-2 text-sm">

<div>Total Weight</div>
<div id="totalWeight"></div>

<div>Total Bags</div>
<div id="totalBags"></div>

<div>Total Amount</div>
<div id="amount"></div>

<div>Commission (2%)</div>
<div id="commission"></div>

<div>Labour</div>
<div id="labour"></div>

<div>Veman</div>
<div id="veman"></div>

<div>Cess</div>
<div id="cess"></div>

<div>Association</div>
<div id="association"></div>

<div>CGST</div>
<div id="cgst"></div>

<div>SGST</div>
<div id="sgst"></div>

<div class="font-semibold">Total Charges</div>
<div id="totalCharges"></div>

<div class="text-lg font-bold text-green-600">Total Payable</div>
<div id="totalPayable" class="text-lg font-bold text-green-600"></div>

</div>

</div>

</div>

<script>

function createEntries(){

let count = document.getElementById("entryCount").value
let container = document.getElementById("entries")

container.innerHTML=""

for(let i=0;i<count;i++){

container.innerHTML += `
<div class="grid grid-cols-3 gap-3">

<input type="number" step="0.01" placeholder="Weight (kg)" class="weight border p-2 rounded">

<input type="number" step="0.01" placeholder="Rate (per 100kg)" class="rate border p-2 rounded">

<input type="number" placeholder="Bags" class="bags border p-2 rounded">

</div>
`

}

}

function calculate(){

let weights = document.querySelectorAll(".weight")
let rates = document.querySelectorAll(".rate")
let bags = document.querySelectorAll(".bags")

let totalWeight = 0
let totalBags = 0
let amount = 0

for(let i=0;i<weights.length;i++){

let w = parseFloat(weights[i].value) || 0
let r = parseFloat(rates[i].value) || 0
let b = parseFloat(bags[i].value) || 0

let ratePerKg = r/100

totalWeight += w
totalBags += b

amount += w * ratePerKg

}

let commission = amount * 0.02
let labour = totalBags * 5.5
let veman = totalBags * 2
let cess = amount * 0.006
let association = totalBags * 0.5
let cgst = amount * 0.025
let sgst = amount * 0.025

let totalCharges = commission + labour + veman + cess + association + cgst + sgst
let totalPayable = amount + totalCharges

document.getElementById("totalWeight").innerText = totalWeight.toFixed(2)+" kg"
document.getElementById("totalBags").innerText = totalBags
document.getElementById("amount").innerText = "₹ "+amount.toFixed(2)
document.getElementById("commission").innerText = "₹ "+commission.toFixed(2)
document.getElementById("labour").innerText = "₹ "+labour.toFixed(2)
document.getElementById("veman").innerText = "₹ "+veman.toFixed(2)
document.getElementById("cess").innerText = "₹ "+cess.toFixed(2)
document.getElementById("association").innerText = "₹ "+association.toFixed(2)
document.getElementById("cgst").innerText = "₹ "+cgst.toFixed(2)
document.getElementById("sgst").innerText = "₹ "+sgst.toFixed(2)
document.getElementById("totalCharges").innerText = "₹ "+totalCharges.toFixed(2)
document.getElementById("totalPayable").innerText = "₹ "+totalPayable.toFixed(2)

document.getElementById("resultBox").classList.remove("hidden")

}

</script>

</body>
</html>
